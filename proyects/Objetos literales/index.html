<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>Caso 2 - Teletransporte de Goku</title>
</head>
<body>
    <div class="contenedor">
        <h1>Goku - Teletransporte</h1>
        
        <div class="mapa">
            <div id="goku" class="personaje">🧔</div>
        </div>
        
        <div class="panel-info">
            <div class="info">
                <label>X:</label>
                <span id="posX">0</span>
            </div>
            <div class="info">
                <label>Y:</label>
                <span id="posY">0</span>
            </div>
        </div>
        
        <div class="instrucciones">
            <p><strong>Controles:</strong></p>
            <p><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> Mover | <kbd>ESPACIO</kbd> Teletransporte</p>
        </div>
        
        <div class="efectos" id="efectos"></div>
    </div>
</body>
</html>
